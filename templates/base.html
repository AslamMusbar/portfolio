{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Primary SEO meta -->
    <title>{% block title %}Aslam Musbar M — Software Engineer & Full Stack Developer | Portfolio{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Aslam Musbar M is a Software Engineer and Full Stack Developer in Chennai, India, specializing in Python, Django, React, and MySQL. Explore projects, experience, and get in touch.{% endblock %}">
    <meta name="keywords" content="{% block meta_keywords %}Aslam Musbar M, Aslam Musbar, Aslam Musbar Chennai, Aslam Musbar developer, Software Engineer, Full Stack Developer, Python Developer, Django Developer, React Developer, portfolio{% endblock %}">
    <meta name="author" content="Aslam Musbar M">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="{{ request.build_absolute_uri|default:'https://aslam.alwaysdata.net/' }}">
    <link rel="shortcut icon" type="image/x-icon" href="{% static 'assets/images/a_mine/logo-aslam.webp' %}">

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="Aslam Musbar M — Portfolio">
    <meta property="og:title" content="{% block og_title %}Aslam Musbar M — Software Engineer & Full Stack Developer{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Software Engineer & Full Stack Developer in Chennai, India — Python, Django, React, and MySQL. Explore my projects and experience.{% endblock %}">
    <meta property="og:url" content="{{ request.build_absolute_uri|default:'https://aslam.alwaysdata.net/' }}">
    <meta property="og:image" content="{{ request.scheme|default:'https' }}://{{ request.get_host|default:'aslam.alwaysdata.net' }}{% static 'assets/images/a_mine/aslam.png' %}">
    <meta property="og:locale" content="en_US">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}Aslam Musbar M — Software Engineer & Full Stack Developer{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Software Engineer & Full Stack Developer in Chennai, India — Python, Django, React, and MySQL.{% endblock %}">
    <meta name="twitter:image" content="{{ request.scheme|default:'https' }}://{{ request.get_host|default:'aslam.alwaysdata.net' }}{% static 'assets/images/a_mine/aslam.png' %}">

    <!-- Add your Google Search Console verification code here after registering the site: -->

      "gender": "Male",
      "nationality": "Indian",
      "address": {
        "@type": "PostalAddress",

        "https://www.instagram.com/asl.ofl/",
        "https://www.facebook.com/alaslam.alaslam.779"
